# Copier sur le VPS :
#   sudo cp nginx.talkeo.fr.conf /etc/nginx/sites-available/talkeo
#   sudo ln -sf /etc/nginx/sites-available/talkeo /etc/nginx/sites-enabled/talkeo
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name talkeo.fr www.talkeo.fr;

    client_max_body_size 1m;

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl;
    server_name talkeo.fr www.talkeo.fr;

    ssl_certificate /etc/letsencrypt/live/talkeo.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/talkeo.fr/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 1m;

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

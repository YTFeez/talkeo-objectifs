limit_req_zone $binary_remote_addr zone=talkeo_general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=talkeo_auth:10m rate=5r/m;

server {
    listen 80;
    server_name talkeo.tondomaine.com;

    client_max_body_size 1m;
    client_body_timeout 10s;
    keepalive_timeout 15s;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /api/auth/ {
        limit_req zone=talkeo_auth burst=5 nodelay;

        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        limit_req zone=talkeo_general burst=30 nodelay;

        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
